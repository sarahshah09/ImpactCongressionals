name: Nightly FEC Update

on:
  schedule:
    - cron: '0 4 * * *' # Runs at Midnight EST
  workflow_dispatch: # Allows you to click "Run workflow" manually

permissions:
  contents: write # This gives the bot permission to save the data.json file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run FEC Scraper
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python scraper.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "FEC-Bot"
          git config --global user.email "bot@impact.com"
          git add data.json
          # Only commit if the file actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update FEC data" && git push)
