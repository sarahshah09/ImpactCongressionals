<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact-Endorsed Congressional Candidates</title>
    <style>
        :root {
            --impact-green: #38a169;
            --rival-red: #e53e3e;
            --bg-gray: #f8fafc;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-gray); color: #1e293b; line-height: 1.5; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 1.1rem; }

        .legend { display: flex; justify-content: center; gap: 24px; margin-top: 20px; font-weight: 600; font-size: 0.9rem; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        .district-card { background: white; border-radius: 16px; padding: 32px; margin-bottom: 32px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        h2 { font-size: 1.5rem; margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 24px; }

        .candidate-block { padding: 20px 0; border-bottom: 1px solid #f1f5f9; }
        .candidate-block:last-child { border-bottom: none; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .name { font-size: 1.1rem; font-weight: 700; }
        .badge { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 4px 12px; border-radius: 9999px; letter-spacing: 0.05em; }
        .badge-impact { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .badge-rival { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .metric-box { background: #f1f5f9; padding: 12px; border-radius: 8px; }
        .label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        .val { font-size: 1rem; font-weight: 700; display: block; }

        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 16px; overflow: hidden; }
        .fill { height: 100%; transition: width 1s ease-out; }

        .footer-info { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.75rem; color: #94a3b8; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Impact 5 Intelligence Dashboard</h1>
            <p class="subtitle">2026 Primary Election Cycle Financial Performance</p>
            <div class="legend">
                <div class="legend-item"><span class="dot" style="background:var(--impact-green)"></span> Impact Candidate</div>
                <div class="legend-item"><span class="dot" style="background:var(--rival-red)"></span> Primary Rival</div>
            </div>
        </header>

        <div id="dashboard">Loading latest FEC filings...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
